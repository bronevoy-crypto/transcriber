audio:
  sample_rate: 16000
  chunk_ms: 500          # размер чанка в мс
  silence_duration: 0.2  # пауза в секундах, после которой реплика считается завершённой

vad:
  threshold: 0.3
  min_speech_ms: 250

model:
  type: "gigaam_e2e"  # "gigaam_e2e" | "gigaam" | "whisper" | "parakeet" | "tone"
  gigaam_e2e:
    variant: "e2e_ctc"  # "e2e_ctc" или "e2e_rnnt"
  gigaam:
    type: "ctc"   # "ctc" или "transducer"
    model_path: "models/gigaam-v3/model.int8.onnx"
    tokens_path: "models/gigaam-v3/tokens.txt"
    encoder_path: "models/gigaam-v3-rnnt/encoder.int8.onnx"
    decoder_path: "models/gigaam-v3-rnnt/decoder.onnx"
    joiner_path: "models/gigaam-v3-rnnt/joiner.int8.onnx"
    rnnt_tokens_path: "models/gigaam-v3-rnnt/tokens.txt"
  whisper:
    model: "large-v3"
    language: "ru"
    device: "cuda"
    compute_type: "float16"
  parakeet:
    encoder_path: "models/parakeet/encoder.int8.onnx"
    decoder_path: "models/parakeet/decoder.int8.onnx"
    joiner_path: "models/parakeet/joiner.int8.onnx"
    tokens_path: "models/parakeet/tokens.txt"
    num_threads: 2
  tone:
    num_threads: 2

diarization:
  enabled: true
  # Токен HuggingFace берётся из переменной окружения HF_TOKEN (см. .env.example).
  device: "cuda"
  min_speakers: null   # null = авто, или задать число (например 1)
  max_speakers: null   # null = авто, или задать число (например 4)

output:
  dir: "meetings"
